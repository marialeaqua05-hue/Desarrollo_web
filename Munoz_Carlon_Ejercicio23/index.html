<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Muñoz Carlón María Letcia - Ejercicio 23 </title>
    <style>
        /* Paleta de colores rosas */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #fce4ec; 
            color: #4a148c; 
            padding: 40px; 
            display: flex;
            justify-content: center;
        }
        .contenedor { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(233, 30, 99, 0.2); 
            max-width: 350px; 
            width: 100%;
            border-top: 5px solid #e91e63; 
        }
        h1 { 
            color: #d81b60; 
            font-size: 22px; 
            text-align: center; 
            margin-bottom: 20px;
        }
        .grupo-input { margin-bottom: 15px; }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #c2185b; 
        }
        input[type="number"] { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #f8bbd0; 
            border-radius: 8px; 
            box-sizing: border-box;
            background-color: #fffafb;
            font-size: 16px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #e91e63; 
        }
        button { 
            width: 100%;
            background: #e91e63; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { 
            background: #c2185b; 
        }
        .resultado-caja {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            display: none; 
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de IMC para Mujer</h1>
        
        <form id="formulario-imc">
            <div class="grupo-input">
                <label for="peso">Peso (en kilogramos):</label>
                <input type="number" id="peso" placeholder="Ej: 65" step="0.1" required>
            </div>
            
            <div class="grupo-input">
                <label for="altura">Altura (en centímetros):</label>
                <input type="number" id="altura" placeholder="Ej: 165" required>
            </div>

            <button type="button" onclick="calcularIMC()">Calcular mi IMC</button>
        </form>

        <div id="pantalla-resultado" class="resultado-caja"></div>
    </div>

    <script src="imc.js"></script>

</body>
</html>
